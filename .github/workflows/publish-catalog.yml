name: Publish Plugin Catalog

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    name: Publish Jellyfin Plugin Repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Publish plugin catalog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/publish-plugin-catalog.py --repository "${{ github.repository }}"
