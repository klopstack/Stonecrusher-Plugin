name: Release

on:
  push:
    tags:
      - '*-sc*'

permissions:
  contents: write

jobs:
  release:
    name: Publish Plugin Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build backend
        run: dotnet build backend/Moonfin.Server.csproj -c Release

      - name: Package release ZIP
        id: package
        run: |
          set -euo pipefail
          OUTPUT=$(bash .github/scripts/package-release.sh)
          echo "$OUTPUT"
          while IFS='=' read -r key value; do
            echo "${key}=${value}" >> "$GITHUB_OUTPUT"
          done <<< "$OUTPUT"

      - name: Resolve catalog version
        id: catalog
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${{ steps.package.outputs.version }}"
          SC_SUFFIX="${TAG##*-sc}"
          IFS='.' read -r MA MI BU _ <<< "$VERSION"
          MANIFEST_VERSION="${MA}.${MI}.${BU}.${SC_SUFFIX}"
          echo "manifest_version=$MANIFEST_VERSION" >> "$GITHUB_OUTPUT"

      - name: Prepare release assets
        run: |
          set -euo pipefail
          ZIP="${{ steps.package.outputs.zip_name }}"
          MANIFEST_VERSION="${{ steps.catalog.outputs.manifest_version }}"
          md5sum "$ZIP" > "${ZIP}.md5"
          sha256sum "$ZIP" > "${ZIP}.sha256"
          sed -i "s/^version: .*/version: \"${MANIFEST_VERSION}\"/" build.yaml
          ls -l "$ZIP" "${ZIP}.md5" "${ZIP}.sha256" build.yaml

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ steps.package.outputs.zip_name }}
            ${{ steps.package.outputs.zip_name }}.md5
            ${{ steps.package.outputs.zip_name }}.sha256
            build.yaml
          fail_on_unmatched_files: true

      - name: Update manifest on master
        id: manifest
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          MANIFEST_VERSION="${{ steps.catalog.outputs.manifest_version }}"
          CHECKSUM="${{ steps.package.outputs.checksum }}"
          TARGET_ABI="${{ steps.package.outputs.target_abi }}"
          TIMESTAMP="${{ steps.package.outputs.timestamp }}"
          SOURCE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${{ steps.package.outputs.zip_name }}"
          IMAGE_URL="https://raw.githubusercontent.com/${{ github.repository }}/master/backend/assets/logo.png"

          git fetch origin master
          git checkout master

          jq --arg ver "$MANIFEST_VERSION" \
             --arg abi "$TARGET_ABI" \
             --arg sum "$CHECKSUM" \
             --arg time "$TIMESTAMP" \
             --arg url "$SOURCE_URL" \
             --arg img "$IMAGE_URL" \
             --arg log "Stonecrusher Media Android TV fork release (${TAG}). See https://github.com/${{ github.repository }}/releases." \
             '.[0].versions = [
               {
                 "version": $ver,
                 "changelog": $log,
                 "targetAbi": $abi,
                 "sourceUrl": $url,
                 "checksum": $sum,
                 "timestamp": $time,
                 "dependencies": []
               }
             ] + .[0].versions |
              .[0].imageUrl = $img' \
             manifest.json > manifest.json.tmp
          mv manifest.json.tmp manifest.json

      # GITHUB_TOKEN cannot bypass the "Protect Main" ruleset. Use a GitHub App
      # installation token instead (secrets RELEASE_APP_ID, RELEASE_APP_PRIVATE_KEY).
      # The app must also be on the ruleset bypass list — see UPSTREAM.md.
      - name: Create release app token
        id: release-app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Commit manifest update
        env:
          GH_TOKEN: ${{ steps.release-app-token.outputs.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json build.yaml
          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi
          git commit -m "Update manifest.json for release ${{ steps.tag.outputs.tag }}"
          git config --unset-all http.https://github.com/.extraheader || true
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin master

      - name: Release summary
        run: |
          echo "## Release Published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Tag** | \`${{ steps.tag.outputs.tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Catalog version** | \`${{ steps.catalog.outputs.manifest_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Assembly version** | \`${{ steps.package.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Checksum (MD5)** | \`${{ steps.package.outputs.checksum }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Artifact** | \`${{ steps.package.outputs.zip_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Plugin repository** | \`https://klopstack.github.io/Stonecrusher-Plugin/repository.json\` |" >> "$GITHUB_STEP_SUMMARY"

  generate:
    name: Publish Jellyfin Plugin Repository
    runs-on: ubuntu-latest
    needs:
      - release
    steps:
      - name: Jellyfin plugin repo
        uses: Kevinjil/jellyfin-plugin-repo-action@v0.4.3
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
