name: Release

on:
  push:
    tags:
      - '*-sc*'

permissions:
  contents: write

jobs:
  release:
    name: Publish Plugin Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build backend
        run: dotnet build backend/Moonfin.Server.csproj -c Release

      - name: Package release ZIP
        id: package
        run: |
          set -euo pipefail
          OUTPUT=$(bash .github/scripts/package-release.sh)
          echo "$OUTPUT"
          while IFS='=' read -r key value; do
            echo "${key}=${value}" >> "$GITHUB_OUTPUT"
          done <<< "$OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ steps.package.outputs.zip_name }}
          fail_on_unmatched_files: true

      - name: Update manifest on master
        id: manifest
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${{ steps.package.outputs.version }}"
          CHECKSUM="${{ steps.package.outputs.checksum }}"
          TARGET_ABI="${{ steps.package.outputs.target_abi }}"
          TIMESTAMP="${{ steps.package.outputs.timestamp }}"
          SOURCE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${{ steps.package.outputs.zip_name }}"
          MANIFEST_VERSION="${VERSION}-${TAG##*-}"

          git fetch origin master
          git checkout master

          jq --arg ver "$MANIFEST_VERSION" \
             --arg abi "$TARGET_ABI" \
             --arg sum "$CHECKSUM" \
             --arg time "$TIMESTAMP" \
             --arg url "$SOURCE_URL" \
             --arg log "Stonecrusher Media Android TV fork release (${TAG}). See https://github.com/klopstack/Moonfin-Plugin/releases." \
             '.[0].versions = [
               {
                 "version": $ver,
                 "changelog": $log,
                 "targetAbi": $abi,
                 "sourceUrl": $url,
                 "checksum": $sum,
                 "timestamp": $time,
                 "dependencies": []
               }
             ] + .[0].versions |
              .[0].imageUrl = "https://raw.githubusercontent.com/klopstack/Moonfin-Plugin/master/backend/assets/logo.png"' \
             manifest.json > manifest.json.tmp
          mv manifest.json.tmp manifest.json

          echo "manifest_version=$MANIFEST_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi
          git commit -m "Update manifest.json for release ${{ steps.tag.outputs.tag }}"
          git push origin master

      - name: Release summary
        run: |
          echo "## Release Published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Tag** | \`${{ steps.tag.outputs.tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Manifest version** | \`${{ steps.manifest.outputs.manifest_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Assembly version** | \`${{ steps.package.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Checksum (MD5)** | \`${{ steps.package.outputs.checksum }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Artifact** | \`${{ steps.package.outputs.zip_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
