name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build backend
        id: backend_build
        continue-on-error: true
        run: |
          set -o pipefail
          dotnet build backend/Moonfin.Server.csproj -c Release 2>&1 | tee "${{ runner.temp }}/backend-build.log"

      - name: Fail if build failed
        if: steps.backend_build.outcome != 'success'
        run: exit 1

      - name: Test backend
        id: backend_test
        if: steps.backend_build.outcome == 'success'
        run: |
          set -o pipefail
          dotnet test backend.tests/Moonfin.Server.Tests.csproj -c Release 2>&1 | tee "${{ runner.temp }}/backend-test.log"

      - name: Fail if tests failed
        if: steps.backend_build.outcome == 'success' && steps.backend_test.outcome != 'success'
        run: exit 1

      - name: Save build results
        if: always() && github.event_name == 'pull_request'
        run: |
          mkdir -p "${{ runner.temp }}/build-results"

          cat > "${{ runner.temp }}/build-results/outcomes.json" <<EOF
          {
            "pr_number": ${{ github.event.pull_request.number }},
            "sha": "${{ github.event.pull_request.head.sha }}",
            "backend_build": "${{ steps.backend_build.outcome }}"
          }
          EOF

          if [ -f "${{ runner.temp }}/backend-build.log" ]; then
            cp "${{ runner.temp }}/backend-build.log" "${{ runner.temp }}/build-results/"
          fi

      - name: Upload build results
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: build-results
          path: ${{ runner.temp }}/build-results/

      - name: Package release ZIP
        if: steps.backend_build.outcome == 'success'
        id: package
        run: |
          set -euo pipefail
          OUTPUT=$(bash .github/scripts/package-release.sh)
          echo "$OUTPUT"
          while IFS='=' read -r key value; do
            echo "${key}=${value}" >> "$GITHUB_OUTPUT"
          done <<< "$OUTPUT"

      - name: Upload plugin artifact
        if: steps.backend_build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.zip_name }}
          path: ${{ steps.package.outputs.zip_name }}

      - name: Build summary
        if: steps.backend_build.outcome == 'success'
        run: |
          echo "## Build Successful" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Version** | \`${{ steps.package.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Target ABI** | \`${{ steps.package.outputs.target_abi }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Checksum (MD5)** | \`${{ steps.package.outputs.checksum }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Artifact** | \`${{ steps.package.outputs.zip_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Download the packaged ZIP from the workflow **Artifacts** section to smoke-test this PR." >> "$GITHUB_STEP_SUMMARY"
          fi
